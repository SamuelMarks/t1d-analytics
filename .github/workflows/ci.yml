name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  python-tests:
    name: Python Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run Pytest Coverage
        run: pytest tests/ --cov=src/t1d_analytics --cov-fail-under=100

      - name: Integration Test - Tiny Dataset Load
        run: |
          mkdir -p tests/test_data
          echo "id,name,value" > tests/test_data/tiny.csv
          echo "1,Test A,100" >> tests/test_data/tiny.csv
          echo "2,Test B,200" >> tests/test_data/tiny.csv

          # Load tiny dataset into DuckDB
          python -c "from t1d_analytics.analytics import load_data_to_duckdb; load_data_to_duckdb('tests/test_data/', 'ci_test.duckdb')"

          # Verify the database has the data
          python -c "import duckdb; conn = duckdb.connect('ci_test.duckdb'); res = conn.execute('SELECT count(*) FROM t_tiny').fetchone()[0]; assert res == 2, f'Expected 2 rows, got {res}'"

  web-tests:
    name: Web Frontend Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install NPM dependencies
        working-directory: ./web
        run: npm ci

      - name: Build Web Application
        working-directory: ./web
        run: npm run build

      - name: Run Web Unit Tests (Vitest)
        working-directory: ./web
        run: npm run coverage

      - name: Install Playwright Browsers
        working-directory: ./web
        run: npx playwright install --with-deps chromium

      - name: Run Web E2E Tests (Playwright)
        working-directory: ./web
        run: npx playwright test --project=chromium
