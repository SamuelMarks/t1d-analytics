<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>t1d-analytics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <nav id="sidebar" class="sidebar" aria-label="Sidebar">
        <div class="sidebar-header">
          <button
            id="new-chat-btn"
            class="btn-primary"
            aria-label="Start a new chat"
          >
            + New Chat
          </button>
          <button
            id="close-sidebar-btn"
            class="icon-btn mobile-only"
            aria-label="Close sidebar"
          >
            ✕
          </button>
        </div>
        <ul id="chat-list" class="chat-list" aria-label="Chat history">
          <!-- Chat items will be injected here -->
        </ul>
        <div id="schema-explorer" class="schema-explorer">
          <div class="schema-header">
            <h3>Schema Explorer</h3>
            <button
              id="toggle-schema-btn"
              class="icon-btn"
              aria-label="Toggle Schema Explorer"
            >
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <polyline points="18 15 12 9 6 15"></polyline>
              </svg>
            </button>
          </div>
          <div id="schema-content" class="schema-content">
            <!-- Schema will be injected here -->
            <div class="schema-loading">Loading schema...</div>
          </div>
        </div>
      </nav>

      <main id="main-pane" aria-label="Main chat area">
        <header class="main-header">
          <div class="header-left">
            <button
              id="open-sidebar-btn"
              class="icon-btn mobile-only"
              aria-label="Open sidebar"
            >
              ☰
            </button>
            <div class="model-selector-container">
              <label for="model-select">Model:</label>
              <select id="model-select" aria-label="Select AI Model">
                <option value="gemma4">Gemma 4</option>
                <option value="sql">Literal SQL</option>
              </select>
            </div>
          </div>
          <div class="header-right">
            <button
              id="theme-toggle-btn"
              class="icon-btn"
              aria-label="Toggle dark and light mode"
              aria-pressed="true"
            >
              <!-- Default sun icon (for dark mode active) -->
              ☀
            </button>
          </div>
        </header>

        <div
          id="messages-container"
          class="messages-container"
          aria-live="polite"
          aria-atomic="false"
        >
          <!-- Messages injected here -->
          <div class="empty-state">Select or create a chat to begin.</div>
        </div>

        <footer class="main-footer">
          <form id="chat-form" class="chat-form" aria-label="Chat input form">
            <label for="chat-input" class="sr-only">Type a message...</label>
            <div id="chat-input-wrapper" class="chat-input-wrapper disabled">
              <pre
                aria-hidden="true"
              ><code id="chat-input-highlight" class="language-sql"></code></pre>
              <textarea
                id="chat-input"
                placeholder="Type a message..."
                autocomplete="off"
                disabled
                aria-label="Chat input field"
                rows="1"
                spellcheck="false"
              ></textarea>
            </div>
            <button
              type="submit"
              id="send-btn"
              class="btn-primary"
              disabled
              aria-label="Send message"
            >
              Send
            </button>
          </form>
        </footer>
      </main>

      <div id="overlay" class="overlay" aria-hidden="true"></div>
    </div>
    <div id="table-modal" class="modal" aria-hidden="true">
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="modal-title">Table Data</h2>
          <button
            id="close-modal-btn"
            class="icon-btn"
            aria-label="Close modal"
          >
            ✕
          </button>
        </div>
        <div class="modal-body" id="modal-body">
          <div id="table-loading" style="display: none">Loading...</div>
          <div class="table-container">
            <table id="modal-table">
              <thead id="modal-table-head"></thead>
              <tbody id="modal-table-body"></tbody>
            </table>
          </div>
        </div>
        <div class="modal-footer">
          <button id="prev-page-btn" class="btn-secondary" disabled>
            Previous
          </button>
          <span id="page-indicator">Page 1</span>
          <button id="next-page-btn" class="btn-secondary" disabled>
            Next
          </button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
